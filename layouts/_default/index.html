{{ define "main" }}
<main class="homepage">
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>{{ .Site.Params.homeTitle }}</h1>
      <p class="tagline">{{ .Site.Params.homeSubtitle }}</p>
      <div class="cta-buttons">
        <a href="/blogs" class="btn">View Blog</a>
        <a href="/contact/Contact" class="btn">Get in Touch</a>
      </div>
    </div>
  </section>

  <!-- Featured Content Grid -->
  <section class="featured">
    <h2>Featured Plants</h2>
    <div class="grid">
      {{ range first 3 (where .Site.RegularPages "Section" "products") }}
      <article class="card">
        <img src="{{ .Params.image }}" alt="{{ .Title }}">
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
        <a href="{{ .RelPermalink }}" class="btn">Learn More</a>
      </article>
      {{ end }}
    </div>
  </section>
</main>
{{ end }}
